<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL DE ADQUISICIÓN | Robotiax Master List</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        /* CSS RESPONSIVO Y CORREGIDO */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --ia-red: #ff3333; --sec-cyan: #00eaff; --bg: #050505; --border: rgba(255,255,255,0.1); }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; padding: 0; line-height: 1.4; width: 100%; overflow-x: hidden; }
        .master-container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 20px 15px; }
        header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding: 15px 0; }
        h1 { font-family: 'Orbitron'; font-size: clamp(1.1rem, 6vw, 2.5rem); letter-spacing: 2px; margin: 0; color: #fff; }
        .subtitle { color: #666; font-family: 'Share Tech Mono'; margin-top: 5px; font-size: 0.8rem; letter-spacing: 1px; }

        .sector-title { 
            font-family: 'Orbitron'; font-size: 1.1rem; margin: 40px 0 20px; padding: 12px; 
            background: rgba(255,255,255,0.03); text-transform: uppercase; text-align: center; 
            border-bottom: 2px solid; width: 100%;
        }
        .ia-sector { border-color: var(--ia-red); color: var(--ia-red); }
        .sec-sector { border-color: var(--sec-cyan); color: var(--sec-cyan); }

        .product-row { 
            display: block; 
            width: 100%; 
            padding: 50px 20px; 
            text-align: center; 
            position: relative;
            background: #050505;
            /* Eliminamos el border-bottom tradicional que fallaba */
            border: none !important;
        }

        /* LA LÍNEA INEVITABLE: Un bloque físico blanco de 10px de alto */
        .product-row::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 10px; /* Grosor extremo */
            background: #ffffff !important; /* Blanco puro */
            box-shadow: 0 0 15px rgba(255,255,255,0.5); /* Resplandor para que brille */
            display: block !important;
        }

        .product-row:nth-of-type(even) { background: #1a1a1a; }
            transition: background 0.3s ease;
            background: #050505; /* Fondo negro base */
        }

        /* Alternancia de fondos (Gris para los pares) */
        .product-row:nth-of-type(even) {
            background: #111111; /* Gris oscuro táctico */
        }

        /* Hover para resaltar la fila activa */
        .product-row:hover { 
            background: rgba(255,255,255,0.05) !important; 
        }

        /* LÍNEA DIVISORIA MAESTRA: Blanca, Gruesa e Inevitable */
        .product-row { 
            display: block; 
            width: 100%; 
            padding: 35px 15px; /* Aumentamos espacio para que respire la línea */
            text-align: center; 
            transition: background 0.3s ease;
            border-bottom: 6px solid #ffffff !important; /* Blanco sólido 100% y más grueso */
        }

        /* Mantener el color de fondo alternado pero asegurar que la línea destaque */
        .product-row:nth-of-type(even) { background: #1c1c1c; }
        .product-row:nth-of-type(odd) { background: #050505; }

        /* Brillo de sector para no perder la identidad visual */
        .ia-row { box-shadow: inset 0 -10px 20px -15px #ff3333; }
        .sec-row { box-shadow: inset 0 -10px 20px -15px #00eaff; }

        /* Separadores de Neón Temáticos */
        .ia-row { 
            border-bottom: 1px solid rgba(255, 51, 51, 0.4) !important; 
            box-shadow: inset 0 -8px 10px -10px rgba(255, 51, 51, 0.4);
        }

        .sec-row { 
            border-bottom: 1px solid rgba(0, 234, 255, 0.4) !important; 
            box-shadow: inset 0 -8px 10px -10px rgba(0, 234, 255, 0.4);
        }

        .product-row:hover { background: rgba(255,255,255,0.02); }
        /* Ajuste global de fuentes y prevención de desbordamiento */
    .p-name { 
        font-weight: 700; 
        font-size: 1.1rem; /* Reducción de 1.3 a 1.1 */
        color: #fff; 
        text-transform: uppercase; 
        margin-bottom: 8px; 
        line-height: 1.2;
        word-wrap: break-word; /* Evita que el texto se salga */
        overflow-wrap: break-word;
    }
    .p-desc { 
        color: #888; 
        font-size: 0.85rem; /* Reducción de 0.95 a 0.85 */
        line-height: 1.3; 
        margin-bottom: 12px; 
        padding: 0 10px; /* Contenedor invisible de seguridad */
    }
    /* Estilos específicos para Ciberseguridad (Sector II) */
    .sec-row .p-name {
        font-size: 0.95rem; /* Reducción extra para seguridad */
        color: var(--sec-cyan);
    }
    .sec-row .p-desc {
        font-size: 0.8rem;
    }
    .p-price { font-family: 'Orbitron'; font-weight: 900; font-size: 1.2rem; color: #fff; margin-bottom: 15px; display: block; }
        
        .btn-buy { 
            display: inline-block; width: auto; min-width: 180px; padding: 10px 25px; 
            font-family: 'Orbitron'; font-weight: 900; font-size: 0.9rem; cursor: pointer; border: none; 
            text-transform: uppercase; transition: 0.3s;
        }
        .btn-ia { background: var(--ia-red); color: #000; }
        .btn-sec { background: var(--sec-cyan); color: #000; }

        /* Estilo para Producto Ya Comprado */
        .btn-owned { 
            background: #2ecc71 !important; /* Verde Esmeralda */
            color: #fff !important; 
            cursor: default !important;
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.4);
        }

        @media (min-width: 900px) {
            .product-row { 
            display: block; 
            width: 100%; 
            padding: 40px 10px; 
            text-align: center; 
            /* LÍNEA DIVISORIA GRUESA Y BLANCA PURA */
            border-bottom: 5px solid #ffffff !important; 
            transition: 0.3s;
        }

        /* Alternancia de fondos para reforzar la separación */
        .product-row:nth-of-type(even) { background: #151515; }
        .product-row:nth-of-type(odd) { background: #050505; }
            .p-name, .p-desc, .p-price { margin: 0; }
            .sector-title { font-size: 1.6rem; text-align: left; border-bottom: none; border-left: 8px solid; padding-left: 25px; }
            .btn-buy { width: 100%; min-width: 0; }
        }

        /* MODALES */
        .modal-overlay { display:none !important; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.98); z-index:10000; justify-content:center; align-items:center; }
        .modal-overlay.visible { display: flex !important; }
        .modal-content { background: #000; border: 2px solid #333; padding: 30px; width: 90%; max-width: 400px; text-align: center; }
        
        /* PANEL DE ACTIVACIÓN CORREGIDO */
        #editor-panel { display:none !important; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:11000; overflow-y:auto; padding: 20px; }
        .edit-card { background: #0a0a0a; max-width: 600px; margin: 0 auto; padding: 30px; border: 1px solid #ffffff; color: #ffffff; }
        .edit-group { margin-bottom: 15px; text-align: left; }
        .edit-group label { display: block; color: #ffffff !important; font-size: 0.8rem; margin-bottom: 5px; font-family: 'Orbitron'; letter-spacing: 1px; }
        .edit-group input, .edit-group textarea { width: 100%; padding: 12px; background: #000; border: 1px solid #444; color: #ffffff; font-family: 'Rajdhani'; }
        /* Forzar blanco en textos de producto y encabezados */
        #display-product-name, #display-product-price, .edit-card h2 { color: #ffffff !important; }

        /* BOTÓN DE ESCAPE TÁCTICO */
        .btn-escape {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 9000;
            background: rgba(0,0,0,0.8);
            color: #ffffff;
            border: 1px solid #ffffff;
            padding: 10px 15px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(5px);
        }

        .btn-escape:hover {
            background: #ffffff;
            color: #000000;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        /* Ajuste para móviles para que no tape el título */
        @media (max-width: 600px) {
            .btn-escape {
                top: auto;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                font-size: 0.7rem;
                width: 80%;
                justify-content: center;
            }
        }

    </style>
</head>
<body>
    <!-- BOTÓN DE RETORNO AL CENTRO DE MANDO -->
    <a href="index.html" class="btn-escape">
        <span style="font-size: 1.2rem;">«</span> [ VOLVER AL INICIO ]
    </a>

    <div class="master-container">

        <header>
            <h1>TERMINAL DE ADQUISICIÓN</h1>
            <div class="subtitle">INFRAESTRUCTURA DE INTELIGENCIA Y DEFENSA</div>
        </header>
        <div id="catalog-render"></div>
    </div>

    <!-- 1. MODAL DE PAGO -->
    <div id="payment-modal-overlay" class="modal-overlay">
        <div class="modal-content" id="modal-border">
            <h2 id="modal-template-name" style="font-family: 'Orbitron'; font-size: 1.2rem; margin-bottom: 20px;"></h2>
            <div id="modal-paypal-container"></div>
            <button onclick="window.app.payments.closeModal()" style="margin-top:20px; background:none; border:none; color:#ff3333; cursor:pointer; font-family:'Share Tech Mono';">[ CANCELAR ]</button>
        </div>
    </div>

    <!-- 2. PANEL DE ACTIVACIÓN (DATOS FISCALES) -->
    <div id="editor-panel">
        <div class="edit-card">
            <h2 style="font-family: 'Orbitron'; color: #ff3333; text-align: center;">DATOS DE ACTIVACIÓN</h2>
            <p id="display-product-name" style="text-align: center; font-weight: bold;"></p>
            <p id="display-product-price" style="text-align: center; color: #666;"></p>
            
            <div class="edit-group">
                <label>NOMBRE O RAZÓN SOCIAL</label>
                <input type="text" id="edit-name">
            </div>
            <div class="edit-group">
                <label>WHATSAPP DE CONTACTO</label>
                <input type="tel" id="edit-phone">
            </div>
            <div class="edit-group">
                <label>DOMICILIO FISCAL COMPLETO</label>
                <input type="text" id="edit-address-fiscal">
            </div>
            <div class="edit-group">
                <label>CORREO DE ENVÍO</label>
                <input type="email" id="edit-email">
            </div>

            <button onclick="window.app.editor.submitOrder()" style="width:100%; padding:20px; background:#ff3333; color:#000; font-family:'Orbitron'; font-weight:900; border:none; cursor:pointer; margin-top:10px;">
                GENERAR ORDEN DE PEDIDO
            </button>
        </div>
    </div>

    <!-- 3. VENTANA DE ÉXITO -->
    <div id="success-notif" class="modal-overlay">
       <div class="modal-content" style="border: 2px solid #00eaff; background: #000; padding: 40px;">
            <div style="width: 60px; height: 60px; background: #00eaff; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 1.5rem; font-weight: bold;">✓</div>
            <h3 style="font-family: 'Orbitron'; color: #fff; letter-spacing: 2px;">PROTOCOLO ACTIVADO</h3>
            <p style="font-family: 'Rajdhani'; color: #888; margin: 15px 0;">Tu orden de pedido ha sido registrada en el sistema central.</p>
            <div style="background: rgba(0,234,255,0.05); border: 1px dashed #00eaff; padding: 15px; color: #00eaff; font-family: 'Share Tech Mono'; font-size: 0.9rem;">
                📩 REVISA TU CORREO (Y SPAM) PARA LAS INSTRUCCIONES DE DESPLIEGUE.
            </div>
            <button onclick="window.location.reload()" style="margin-top:30px; background:#00eaff; color:#000; border:none; padding:15px; width: 100%; cursor:pointer; font-family:'Orbitron'; font-weight:900; text-transform: uppercase;">VOLVER AL ARSENAL</button>
        </div>
    </div>
    
    <script src="js/catalog.js"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=AYQNfuvMDpSNO5zTj3zKNwdv7O9oeEK5Ar467UQzfVcwh15l__01q_o7uPyJKfFVQKcFiNFWlYHehCr6&currency=USD"></script>
    <script src="js/payments.js"></script>
    <script src="js/editor.js"></script>

    <script>
        const renderCatalog = () => {
            const container = document.getElementById('catalog-render');
            const iaSectors = ['ADMINISTRATIVA', 'OPERATIVA', 'MARKETING'];
            const secSectors = ['PERSONAL', 'PYME', 'MEDIANA'];

            container.innerHTML += `<div class="sector-title ia-sector">SECTOR I: ARSENAL IA</div>`;
            iaSectors.forEach(sector => {
                const apps = window.app.catalog.ia.filter(a => a.category === sector);
                apps.forEach(app => container.innerHTML += createRow(app, 'btn-ia', 'ia-row'));
            });

            container.innerHTML += `<div class="sector-title sec-sector">SECTOR II: PROTOCOLO FORTALEZA</div>`;
            secSectors.forEach(sector => {
                const apps = window.app.catalog.security.filter(a => a.category === sector);
                apps.forEach(app => container.innerHTML += createRow(app, 'btn-sec', 'sec-row'));
            });
        };

        const createRow = (p, btnClass, extraClass = '') => `
    <div class="product-row ${extraClass}">
        <div class="p-name">${p.name}</div>
        <div class="p-desc">${p.desc}</div>
        <div class="p-price">$${p.price} ${p.currency}</div>
        <div>
            ${(() => {
                const owned = JSON.parse(localStorage.getItem('makumoto_owned') || '[]');
                return owned.includes(p.id) 
                    ? `<button class="btn-buy btn-owned">ADQUIRIDO ✓</button>` 
                    : `<button class="btn-buy ${btnClass}" onclick="window.app.payments.openModal('${p.id}', '${p.name}', '${p.price}', '${p.currency}')">COMPRAR AHORA</button>`;
            })()}
        </div>
    </div>
`;

        document.addEventListener('DOMContentLoaded', renderCatalog);
    </script>
</body>
</html>
