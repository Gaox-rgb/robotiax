<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL DE ADQUISICIÓN | Robotiax Master List</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { 
            --master-blue-bg: #000033; /* Azul muy oscuro */
            --card-white: #ffffff;
            --btn-blue: #000066;
            --text-black: #000000;
            --text-white: #ffffff;
            --ia-red: #ff3333;
            --sec-cyan: #00eaff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--master-blue-bg); 
            color: var(--text-white); 
            font-family: 'Rajdhani', sans-serif; 
            margin: 0; 
            padding: 0; 
            line-height: 1.6; 
            width: 100%; 
            overflow-x: hidden; 
        }

        /* BOTÓN DE ESCAPE FIJO Y DISCRETO */
        .btn-escape {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 9000;
            background: rgba(0,0,0,0.6);
            color: #ffffff;
            border: 1px solid #ffffff;
            padding: 8px 15px;
            font-family: 'Orbitron';
            font-size: 0.6rem;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .btn-escape:hover {
            background: #ffffff;
            color: #000000;
        }

        .master-container { width: 100%; max-width: 1100px; margin: 0 auto; padding: 60px 20px; }

        header { text-align: center; margin-bottom: 50px; }
        h1 { font-family: 'Orbitron'; font-size: clamp(2rem, 8vw, 3rem); letter-spacing: 2px; margin: 0; color: #fff; text-transform: uppercase; }
        .subtitle { color: #ffffff; font-family: 'Rajdhani'; margin-top: 10px; font-size: 1.2rem; font-weight: 700; letter-spacing: 2px; }

        .sector-title { 
            font-family: 'Orbitron'; font-size: 1.4rem; margin: 60px 0 30px; padding: 15px; 
            background: rgba(255,255,255,0.1); text-transform: uppercase; text-align: center; 
            border-left: 5px solid #fff; width: 100%;
        }

        /* MÓDULOS EN BLANCO PURO */
        .product-row { 
            display: flex;
            flex-direction: column;
            width: 100%; 
            padding: 40px; 
            text-align: center; 
            background: var(--card-white);
            margin-bottom: 25px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .p-name { 
            font-weight: 800; 
            font-size: 1.4rem;
            color: var(--text-black); 
            text-transform: uppercase; 
            margin-bottom: 15px; 
            font-family: 'Orbitron';
        }

        .p-desc { 
            color: var(--text-black); 
            font-size: 1rem; 
            line-height: 1.5; 
            margin-bottom: 25px; 
            font-weight: 500;
        }

        .p-price { 
            font-family: 'Orbitron'; 
            font-weight: 900; 
            font-size: 2.2rem; 
            color: var(--text-black); 
            margin-bottom: 25px; 
            display: block; 
            border-top: 1px solid #ddd;
            padding-top: 20px;
        }
        
        .btn-buy { 
            display: inline-block; width: 100%; padding: 18px; 
            font-family: 'Orbitron'; font-weight: 900; font-size: 0.9rem; cursor: pointer; border: none; 
            text-transform: uppercase; transition: 0.3s;
            background: var(--btn-blue);
            color: var(--text-white);
            border-radius: 4px;
        }

        .btn-buy:hover { 
            background: #0000aa;
            transform: scale(1.02);
        }

        .btn-owned { 
            background: #2ecc71 !important; 
            color: #fff !important; 
            cursor: default !important;
        }

        /* MODALES */
        .modal-overlay { display:none !important; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:10000; justify-content:center; align-items:center; }
        .modal-overlay.visible { display: flex !important; }
        .modal-content { background: #000; border: 2px solid #333; padding: 40px; width: 90%; max-width: 450px; text-align: center; }
        
        /* PANEL DE ACTIVACIÓN */
        #editor-panel { display:none !important; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:11000; overflow-y:auto; padding: 40px; }
        .edit-card { background: #fff; max-width: 600px; margin: 0 auto; padding: 40px; border-radius: 8px; color: #000; }
        .edit-group { margin-bottom: 20px; text-align: left; }
        .edit-group label { display: block; color: #000; font-size: 0.8rem; margin-bottom: 5px; font-family: 'Orbitron'; font-weight: 700; }
        .edit-group input { width: 100%; padding: 15px; background: #f0f0f0; border: 1px solid #ccc; color: #000; font-family: 'Rajdhani'; font-weight: 600; }

    /* BOTÓN DE RETORNO AL TECHO */
        .btn-scroll-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: var(--btn-blue);
            color: #fff;
            border: 1px solid #ffffff;
            border-radius: 50%;
            display: none; /* Se activa por JS */
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 9999;
            font-size: 1.5rem;
            transition: 0.3s;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        .btn-scroll-top:hover {
            background: #ffffff;
            color: var(--master-blue-bg);
            transform: scale(1.1);
        }

    </style>
</head>
<body>
    <a href="index.html" class="btn-escape">❮ VOLVER AL INICIO</a>

    <div class="master-container">
        <header>
            <h1>TERMINAL DE ADQUISICIÓN</h1>
            <div class="subtitle">INFRAESTRUCTURA DE INTELIGENCIA Y DEFENSA</div>
        </header>
        <div id="catalog-render"></div>
    </div>

    <!-- 1. MODAL DE PAGO -->
    <div id="payment-modal-overlay" class="modal-overlay">
        <div class="modal-content">
            <h2 id="modal-template-name" style="font-family: 'Orbitron'; font-size: 1.4rem; margin-bottom: 20px; color: #fff;"></h2>
            <div id="modal-paypal-container"></div>
            <button onclick="window.app.payments.closeModal()" style="margin-top:30px; background:none; border:none; color:#ff3333; cursor:pointer; font-family:'Orbitron'; font-size: 0.7rem;">[ CANCELAR OPERACIÓN ]</button>
        </div>
    </div>

    <!-- 2. PANEL DE ACTIVACIÓN -->
    <div id="editor-panel">
        <div class="edit-card">
            <h2 style="font-family: 'Orbitron'; color: var(--btn-blue); text-align: center; margin-bottom: 30px;">DATOS DE ACTIVACIÓN</h2>
            <p id="display-product-name" style="text-align: center; font-weight: 800; font-size: 1.2rem;"></p>
            <p id="display-product-price" style="text-align: center; color: #666; margin-bottom: 30px;"></p>
            
            <div class="edit-group"><label>RAZÓN SOCIAL</label><input type="text" id="edit-name"></div>
            <div class="edit-group"><label>WHATSAPP</label><input type="tel" id="edit-phone"></div>
            <div class="edit-group"><label>DOMICILIO FISCAL</label><input type="text" id="edit-address-fiscal"></div>
            <div class="edit-group"><label>CORREO DE ENVÍO</label><input type="email" id="edit-email"></div>

            <button onclick="window.app.editor.submitOrder()" style="width:100%; padding:20px; background:var(--btn-blue); color:#fff; font-family:'Orbitron'; font-weight:900; border:none; cursor:pointer; margin-top:10px; border-radius: 4px;">
                GENERAR ORDEN DE PEDIDO
            </button>
        </div>
    </div>

    <!-- 3. VENTANA DE ÉXITO -->
    <div id="success-notif" class="modal-overlay">
       <div class="modal-content" style="border: 2px solid #2ecc71; background: #000; padding: 40px;">
            <div style="width: 60px; height: 60px; background: #2ecc71; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 1.5rem;">✓</div>
            <h3 style="font-family: 'Orbitron'; color: #fff;">ORDEN REGISTRADA</h3>
            <p style="color: #fff; margin: 15px 0;">Tu protocolo ha sido activado en el sistema central.</p>
            <button onclick="window.location.reload()" style="margin-top:30px; background:#2ecc71; color:#fff; border:none; padding:15px; width: 100%; cursor:pointer; font-family:'Orbitron'; font-weight:900;">ENTENDIDO</button>
        </div>
    </div>
    
    <script src="js/catalog.js"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=AYQNfuvMDpSNO5zTj3zKNwdv7O9oeEK5Ar467UQzfVcwh15l__01q_o7uPyJKfFVQKcFiNFWlYHehCr6&currency=USD"></script>
    <script src="js/payments.js"></script>
    <script src="js/editor.js"></script>

    <div id="btn-up" class="btn-scroll-top" onclick="scrollToTop()">▲</div>

    <script>
        // LÓGICA DEL BOTÓN SCROLL TOP
        window.onscroll = function() {
            const btn = document.getElementById('btn-up');
            if (document.body.scrollTop > 500 || document.documentElement.scrollTop > 500) {
                btn.style.display = "flex";
            } else {
                btn.style.display = "none";
            }
        };

        const scrollToTop = () => window.scrollTo({ top: 0, behavior: 'smooth' });

        const renderCatalog = () => {
            const container = document.getElementById('catalog-render');
            const iaSectors = ['ADMINISTRATIVA', 'OPERATIVA', 'MARKETING'];
            const secSectors = ['PERSONAL', 'PYME', 'MEDIANA'];

            container.innerHTML += `<div class="sector-title">SECTOR I: ARSENAL IA</div>`;
            iaSectors.forEach(sector => {
                const apps = window.app.catalog.ia.filter(a => a.category === sector);
                apps.forEach(app => container.innerHTML += createRow(app));
            });

            container.innerHTML += `<div class="sector-title">SECTOR II: PROTOCOLO FORTALEZA</div>`;
            secSectors.forEach(sector => {
                const apps = window.app.catalog.security.filter(a => a.category === sector);
                apps.forEach(app => container.innerHTML += createRow(app));
            });
        };

        const createRow = (p) => `
            <div class="product-row">
                <div class="p-name">${p.name}</div>
                <div class="p-desc">${p.desc}</div>
                <div class="p-price">$${p.price} <span style="font-size:0.9rem; color:#000000; opacity:0.5;">${p.currency}</span></div>
                <div>
                    ${(() => {
                        const owned = JSON.parse(localStorage.getItem('makumoto_owned') || '[]');
                        if (owned.includes(p.id)) {
                            return `<button class="btn-buy btn-owned" disabled>ADQUIRIDO ✓</button>`;
                        }
                        return `<button class="btn-buy" onclick="window.app.payments.openModal('${p.id}', '${p.name}', ${p.price}, '${p.currency}')">COMPRAR AHORA</button>`;
                    })()}
                </div>
            </div>
        `;

        document.addEventListener('DOMContentLoaded', renderCatalog);
    </script>
</body>
</html>
